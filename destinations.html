<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Drift & Discover</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Nav Bar -->
    <nav>
        <div class="container flex justify-between items-center nav-main">
            <a href="index.html" class="logo flex items-center gap-2">
                <img src="logo.png" alt="Drift & Discover Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="group-trips.html">Group Trips</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="tel:+918699246801" class="btn btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">Book Now</a></li>
            </ul>
        </div>
    </nav>

    <section style="background: var(--bg-soft); padding: 60px 0;">
        <div class="container">
            <h1 style="font-size: 2.5rem; color: var(--primary);">Popular Destinations</h1>
            <p style="color: var(--text-muted);">Discover the magic of the Himalayas and beyond.</p>
        </div>
    </section>

    <section>
        <div class="container grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
            <!-- Himachal -->
            <div class="trip-card" style="height: 350px;">
                <div class="card-img-wrapper" style="height: 100%;">
                    <img src="images/manali.png" alt="Himachal">
                    <div style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 2rem; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white;">
                        <h2 style="font-size: 1.8rem;">Himachal Pradesh</h2>
                        <p style="font-size: 0.9rem; opacity: 0.9;">15+ Packages Available</p>
                    </div>
                </div>
            </div>

            <!-- Uttarakhand -->
            <div class="trip-card" style="height: 350px;">
                <div class="card-img-wrapper" style="height: 100%;">
                    <img src="images/group.png" alt="Uttarakhand">
                    <div style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 2rem; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white;">
                        <h2 style="font-size: 1.8rem;">Uttarakhand</h2>
                        <p style="font-size: 0.9rem; opacity: 0.9;">10+ Packages Available</p>
                    </div>
                </div>
            </div>

            <!-- Ladakh -->
            <div class="trip-card" style="height: 350px;">
                <div class="card-img-wrapper" style="height: 100%;">
                    <img src="images/hero_bg.png" alt="Ladakh">
                    <div style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 2rem; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white;">
                        <h2 style="font-size: 1.8rem;">Ladakh</h2>
                        <p style="font-size: 0.9rem; opacity: 0.9;">Limited Summer Batches</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-bottom">
            <p>&copy; 2026 Drift & Discover. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
